<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/><title>Transactions &mdash; CryptoCard</title><link rel="stylesheet" href="style.css"/><style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0B0E11;color:#EAECEF;font-family:'IBM Plex Sans',-apple-system,sans-serif;min-height:100vh;}
.page-layout{display:flex;}
.sidebar{width:220px;background:#0D1117;border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;padding:24px 0;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s;}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:0 20px 24px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;color:#EAECEF;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:12px;}
.sidebar-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#F0B90B,#F8D12F);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.sidebar-nav{list-style:none;flex:1;padding:0 8px;overflow-y:auto;}
.sidebar-nav li a{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;color:rgba(234,236,239,.55);text-decoration:none;font-size:.875rem;font-weight:500;transition:all .2s;margin-bottom:2px;}
.sidebar-nav li a:hover,.sidebar-nav li a.active{background:rgba(240,185,11,.08);color:#F0B90B;}
.sidebar-nav li a.active svg{stroke:#F0B90B;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.07);}
.logout-btn{width:100%;display:flex;align-items:center;gap:8px;padding:10px 14px;background:none;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:rgba(234,236,239,.5);font-size:.84rem;cursor:pointer;font-family:inherit;transition:all .2s;}
.logout-btn:hover{border-color:rgba(239,68,68,.4);color:#EF4444;}
.page-main{margin-left:220px;flex:1;padding:28px 32px;min-height:100vh;}
.page-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.page-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.5rem;color:#EAECEF;}
.page-subtitle{font-size:.82rem;color:rgba(234,236,239,.4);margin-top:4px;}
.avatar-circle{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#F0B90B,#F8D12F);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:#000;cursor:pointer;font-family:'Space Grotesk',sans-serif;}
.card-box{background:#161A1F;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px;margin-bottom:20px;}
.card-box-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1rem;color:#EAECEF;margin-bottom:16px;}
.form-label{font-size:.76rem;color:rgba(234,236,239,.5);font-weight:600;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.4px;}
.form-input{width:100%;background:#0D1117;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;color:#EAECEF;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:rgba(240,185,11,.4);}
.form-select{width:100%;background:#0D1117;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;color:#EAECEF;font-size:.9rem;font-family:inherit;outline:none;}
.form-group{margin-bottom:18px;}
.btn-gold{background:linear-gradient(135deg,#F0B90B,#F8D12F);color:#000;font-weight:700;border:none;border-radius:10px;padding:13px 28px;font-size:.9rem;cursor:pointer;font-family:inherit;transition:opacity .2s;display:inline-flex;align-items:center;gap:8px;}
.btn-gold:hover{opacity:.85;}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 22px;color:rgba(234,236,239,.7);font-size:.88rem;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost:hover{border-color:rgba(255,255,255,.2);color:#EAECEF;}
.btn-danger{background:rgba(246,70,93,.08);border:1px solid rgba(246,70,93,.2);border-radius:10px;padding:11px 22px;color:#F6465D;font-size:.88rem;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-danger:hover{background:rgba(246,70,93,.15);}
.badge-green{display:inline-flex;padding:3px 10px;background:rgba(14,203,129,.1);border:1px solid rgba(14,203,129,.2);border-radius:100px;font-size:.72rem;color:#0ECB81;font-weight:600;}
.badge-yellow{display:inline-flex;padding:3px 10px;background:rgba(240,185,11,.1);border:1px solid rgba(240,185,11,.2);border-radius:100px;font-size:.72rem;color:#F0B90B;font-weight:600;}
.badge-red{display:inline-flex;padding:3px 10px;background:rgba(246,70,93,.1);border:1px solid rgba(246,70,93,.2);border-radius:100px;font-size:.72rem;color:#F6465D;font-weight:600;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem;}
.info-row:last-child{border-bottom:none;}
.info-row .lbl{color:rgba(234,236,239,.45);}
.info-row .val{color:#EAECEF;font-weight:500;}
.mob-menu-btn{display:none;position:fixed;bottom:20px;left:20px;z-index:200;width:44px;height:44px;border-radius:50%;background:#F0B90B;border:none;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(240,185,11,.4);}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1E2026;border:1px solid rgba(240,185,11,.3);border-radius:12px;padding:11px 20px;font-size:.84rem;color:#F0B90B;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .3s;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
div[style*="two-col"]{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.page-main{margin-left:0;padding:20px 16px 80px}.mob-menu-btn{display:flex}.sidebar-backdrop.show{display:block}}
@media(max-width:600px){.page-title{font-size:1.2rem}.card-box{padding:16px}}
</style>
<style>
.tx-empty{text-align:center;padding:80px 20px;color:rgba(234,236,239,.3);}
.tx-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.tx-row:last-child{border-bottom:none;}
.tx-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tx-info{flex:1;min-width:0;}
.tx-merchant{font-size:.9rem;font-weight:500;color:#EAECEF;}
.tx-meta{font-size:.75rem;color:rgba(234,236,239,.4);margin-top:2px;}
.tx-amount{text-align:right;flex-shrink:0;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.filter-btn{padding:7px 16px;border-radius:100px;font-size:.8rem;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(234,236,239,.55);font-family:inherit;transition:all .2s;}
.filter-btn.active{background:rgba(240,185,11,.1);border-color:rgba(240,185,11,.35);color:#F0B90B;}
</style></head><body>
<div class="page-layout">
<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sidebar-logo"><div class="sidebar-logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>CryptoCard</a>
  <ul class="sidebar-nav"><li><a href="dashboard.html"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="3" y="15" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="11" rx="1"/></svg>Dashboard</a></li>
    <li><a href="deposit.html"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17V3"/><path d="m6 11 6 6 6-6"/><path d="M19 21H5"/></svg>Deposit</a></li>
    <li><a href="card.html"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Card</a></li>
    <li><a href="transactions.html" class="active"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></svg>Transactions</a></li>
    <li><a href="kyc.html"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>KYC</a></li>
    <li><a href="settings.html"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a></li></ul>
  <div class="sidebar-footer"><button class="logout-btn" onclick="logout()"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</button></div>
</aside>
<div class="page-main">
  <div class="page-topbar">
    <div><div class="page-title">Transactions</div><div class="page-subtitle">Your full payment history</div></div>
    <div class="avatar-circle" id="userAvatar"></div>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterTx('all',this)">All</button>
    <button class="filter-btn" onclick="filterTx('deposit',this)">Deposits</button>
    <button class="filter-btn" onclick="filterTx('spend',this)">Spend</button>
  </div>
  <div class="card-box">
    <div class="tx-empty">
      <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:16px;opacity:.3;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <div style="font-size:.95rem;font-weight:500;color:rgba(234,236,239,.5);">No transactions yet</div>
      <div style="font-size:.8rem;margin-top:8px;color:rgba(234,236,239,.3);">Deposit USDC to get started</div>
      <a href="deposit.html" style="display:inline-block;margin-top:20px;padding:11px 26px;background:rgba(240,185,11,.1);border:1px solid rgba(240,185,11,.25);border-radius:100px;color:#F0B90B;font-size:.84rem;text-decoration:none;font-weight:600;">Fund Wallet &rarr;</a>
    </div>
  </div>
</div></div>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>
<button class="mob-menu-btn" onclick="toggleSidebar()" aria-label="Menu">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
</button>
<div class="toast" id="pageToast"></div>
<script src="auth.js"></script><script>if(!authGuard()){}</script><script src="app.js"></script>
<script>
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarBackdrop').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarBackdrop').classList.remove('show');}
function showToast(m){const t=document.getElementById('pageToast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
const _u=getCurrentUser();if(_u&&document.getElementById('userAvatar'))document.getElementById('userAvatar').textContent=_u.name.charAt(0).toUpperCase();
</script>
<script>
function filterTx(t,btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
</script></body></html>
