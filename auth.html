<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Sign In — CryptoCard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0B0E11;color:#fff;font-family:'IBM Plex Sans',-apple-system,sans-serif;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

/* Background glow */
body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(240,185,11,.07) 0%,transparent 65%);pointer-events:none;z-index:0;}

.auth-card{position:relative;z-index:1;width:100%;max-width:420px;background:#161A1F;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:36px 32px;box-shadow:0 24px 80px rgba(0,0,0,.6);}

.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#F0B90B,#F8D12F);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.25rem;color:#fff;}

.tab-row{display:flex;background:#0D1117;border-radius:12px;padding:4px;margin-bottom:28px;}
.tab-btn{flex:1;padding:10px;border:none;background:none;border-radius:9px;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:.88rem;color:rgba(255,255,255,.35);cursor:pointer;transition:all .2s;}
.tab-btn.active{background:#1E2329;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3);}

.form{display:none;} .form.active{display:block;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:.72rem;color:rgba(255,255,255,.4);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.field input{width:100%;background:#0D1117;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;color:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.field input:focus{border-color:rgba(240,185,11,.4);}
.field input::placeholder{color:rgba(255,255,255,.2);}

.hint{font-size:.72rem;color:rgba(255,255,255,.25);margin-top:5px;}

.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#F0B90B,#F8D12F);border:none;border-radius:12px;color:#000;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;margin-top:6px;transition:opacity .2s;}
.submit-btn:hover{opacity:.9;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}

.err-box{background:rgba(246,70,93,.08);border:1px solid rgba(246,70,93,.25);border-radius:10px;padding:11px 14px;font-size:.82rem;color:#F6465D;margin-bottom:14px;display:none;}

.divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
.divider span{font-size:.72rem;color:rgba(255,255,255,.2);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07);}

.demo-btn{width:100%;padding:12px;background:rgba(240,185,11,.06);border:1px solid rgba(240,185,11,.2);border-radius:12px;color:#F0B90B;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s;}
.demo-btn:hover{background:rgba(240,185,11,.12);}

.back-home{display:block;text-align:center;margin-top:20px;font-size:.8rem;color:rgba(255,255,255,.3);text-decoration:none;transition:color .2s;}
.back-home:hover{color:#F0B90B;}
</style>
</head>
<body>
<div class="auth-card">
  <div class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    </div>
    <span class="logo-name">CryptoCard</span>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- LOGIN FORM -->
  <div class="form active" id="loginForm">
    <div class="err-box" id="loginErr"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPwd" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="submit-btn" id="loginBtn" onclick="doLogin()">Sign In →</button>

    <div class="divider"><span>or try demo</span></div>
    <button class="demo-btn" onclick="doDemo()">⚡ Login with Demo Account</button>
  </div>

  <!-- REGISTER FORM -->
  <div class="form" id="registerForm">
    <div class="err-box" id="regErr"></div>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="John Doe" autocomplete="name"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="regPwd" placeholder="Min 6 characters" autocomplete="new-password"/>
      <div class="hint">Use at least 6 characters.</div>
    </div>
    <button class="submit-btn" id="regBtn" onclick="doRegister()">Create Account →</button>
  </div>

  <a href="index.html" class="back-home">← Back to homepage</a>
</div>

<script src="auth.js"></script>
<script>
// If already logged in, go straight to dashboard
if(getCurrentUser()) window.location.href='dashboard.html';

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('loginForm').classList.toggle('active', tab==='login');
  document.getElementById('registerForm').classList.toggle('active', tab==='register');
  document.getElementById('loginErr').style.display='none';
  document.getElementById('regErr').style.display='none';
}

function showErr(id, msg){
  const el=document.getElementById(id);
  el.textContent=msg; el.style.display='block';
}

function doLogin(){
  const btn=document.getElementById('loginBtn');
  const email=document.getElementById('loginEmail').value.trim();
  const pwd=document.getElementById('loginPwd').value;
  document.getElementById('loginErr').style.display='none';
  if(!email||!pwd){showErr('loginErr','Please fill in all fields.');return;}
  btn.disabled=true; btn.textContent='Signing in...';
  const result=loginUser(email,pwd);
  if(result.ok){window.location.href='dashboard.html';}
  else{showErr('loginErr',result.error);btn.disabled=false;btn.textContent='Sign In →';}
}

function doRegister(){
  const btn=document.getElementById('regBtn');
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const pwd=document.getElementById('regPwd').value;
  document.getElementById('regErr').style.display='none';
  if(!name||!email||!pwd){showErr('regErr','Please fill in all fields.');return;}
  btn.disabled=true; btn.textContent='Creating account...';
  const result=registerUser(name,email,pwd);
  if(result.ok){window.location.href='dashboard.html';}
  else{showErr('regErr',result.error);btn.disabled=false;btn.textContent='Create Account →';}
}

function doDemo(){
  const result=loginUser('test@gmail.com','Test12345');
  if(result.ok)window.location.href='dashboard.html';
  else alert('Demo account not found. Refresh the page and try again.');
}

// Enter key support
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('loginForm').classList.contains('active'))doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
