<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Choose Currency — CryptoCard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;color:#fff;font-family:'IBM Plex Sans',-apple-system,sans-serif;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background-color:#0B0E11;background-image:radial-gradient(circle,rgba(255,255,255,0.07) 1.5px,transparent 1.5px);background-size:26px 26px;}

.setup-card{position:relative;z-index:1;width:100%;max-width:520px;background:#161A1F;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:36px 32px;box-shadow:0 24px 80px rgba(0,0,0,.6);}
@media(max-width:480px){.setup-card{padding:24px 16px;border-radius:18px;}}

.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#F0B90B,#F8D12F);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.25rem;color:#fff;}

.title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.5rem;color:#fff;text-align:center;margin-bottom:6px;}
.subtitle{font-size:.84rem;color:rgba(255,255,255,.45);text-align:center;margin-bottom:24px;line-height:1.6;}

/* Search */
.search-wrap{position:relative;margin-bottom:16px;}
.search-input{width:100%;background:#0D1117;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 14px 12px 42px;color:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:rgba(240,185,11,.4);}
.search-input::placeholder{color:rgba(255,255,255,.25);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);pointer-events:none;}

/* Popular currencies */
.popular-label{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.popular-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
@media(max-width:400px){.popular-grid{grid-template-columns:repeat(3,1fr);}}
.pop-btn{background:#0D1117;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit;}
.pop-btn:hover{border-color:rgba(240,185,11,.3);background:rgba(240,185,11,.06);}
.pop-btn.selected{border-color:#F0B90B;background:rgba(240,185,11,.1);}
.pop-flag{font-size:1.4rem;display:block;margin-bottom:3px;}
.pop-code{font-size:.7rem;font-weight:700;color:#fff;font-family:'Space Grotesk',sans-serif;}

/* Currency list */
.currency-list{max-height:280px;overflow-y:auto;border:1px solid rgba(255,255,255,.07);border-radius:12px;margin-bottom:20px;}
.currency-list::-webkit-scrollbar{width:4px;}
.currency-list::-webkit-scrollbar-track{background:transparent;}
.currency-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.currency-item{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.04);}
.currency-item:last-child{border-bottom:none;}
.currency-item:hover{background:rgba(255,255,255,.04);}
.currency-item.selected{background:rgba(240,185,11,.07);border-left:2px solid #F0B90B;}
.ci-flag{font-size:1.3rem;flex-shrink:0;width:28px;text-align:center;}
.ci-info{flex:1;min-width:0;}
.ci-code{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;color:#fff;}
.ci-name{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-rate{font-family:'IBM Plex Mono',monospace;font-size:.76rem;color:rgba(255,255,255,.5);text-align:right;flex-shrink:0;}
.ci-check{color:#F0B90B;flex-shrink:0;display:none;}
.currency-item.selected .ci-check{display:block;}

/* Selected preview */
.selected-preview{background:rgba(240,185,11,.06);border:1px solid rgba(240,185,11,.2);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.sp-flag{font-size:2rem;}
.sp-info{flex:1;}
.sp-code{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;color:#F0B90B;}
.sp-name{font-size:.76rem;color:rgba(255,255,255,.45);margin-top:2px;}
.sp-rate{font-family:'IBM Plex Mono',monospace;font-size:.8rem;color:rgba(255,255,255,.5);text-align:right;}

.btn-gold{width:100%;padding:14px;background:linear-gradient(135deg,#F0B90B,#F8D12F);border:none;border-radius:12px;color:#000;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:opacity .2s;}
.btn-gold:hover{opacity:.9;}
.btn-gold:disabled{opacity:.4;cursor:not-allowed;}
.rate-note{text-align:center;font-size:.72rem;color:rgba(255,255,255,.2);margin-top:12px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1E2329;border:1px solid rgba(240,185,11,.3);border-radius:12px;padding:11px 20px;font-size:.84rem;color:#F0B90B;box-shadow:0 8px 32px rgba(0,0,0,.6);transition:transform .3s;z-index:9999;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>

// Only allow if logged in but no currency set

  <div class="rate-note" id="rateNote">Loading live rates…</div>
</div>

const POPULAR = ['USD','EUR','GBP','INR','IDR','BRL','ARS','VES','AED','NGN','MXN','JPY'];

let selectedCode = null;
let rates = {};
let filteredList = [...ALL_CURRENCIES];

async function fetchRates() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const d = await r.json();
    if(d.rates) {
      rates = d.rates;
      document.getElementById('rateNote').textContent = 'Live rates · Updated just now';
      renderList();
      renderPopular();
    }
  } catch(e) {
    // Use fallback
    rates = {USD:1,EUR:0.92,GBP:0.79,JPY:149,INR:83.5,CNY:7.2,AUD:1.53,CAD:1.36,CHF:0.88,HKD:7.82,SGD:1.34,KRW:1325,BRL:5.05,MXN:17.1,IDR:15800,TRY:30.5,ZAR:18.6,ARS:890,AED:3.67,SAR:3.75,NGN:1450,VES:36,THB:35,VND:24500,PHP:56,MYR:4.7,PKR:278,BDT:110};
    document.getElementById('rateNote').textContent = 'Estimated rates (offline)';
    renderList();
    renderPopular();
  }
}

function getRate(code) { return rates[code] || null; }

function formatRate(code, symbol) {
  const r = getRate(code);
  if(!r) return '—';
  const val = r;
  return '1 USDC = ' + symbol + (val > 1000 ? Math.round(val).toLocaleString() : val > 10 ? val.toFixed(2) : val.toFixed(4));
}

function renderPopular() {
  const grid = document.getElementById('popularGrid');
  grid.innerHTML = POPULAR.map(code => {
    const c = ALL_CURRENCIES.find(x => x.code === code);
    if(!c) return '';
    return `<button class="pop-btn ${selectedCode===code?'selected':''}" onclick="selectCurrency('${code}')">
      <span class="pop-flag">${c.flag}</span>
      <span class="pop-code">${code}</span>
    </button>`;
  }).join('');
}

function renderList() {
  const list = document.getElementById('currencyList');
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredList = q
    ? ALL_CURRENCIES.filter(c => c.code.toLowerCase().includes(q) || c.name.toLowerCase().includes(q))
    : ALL_CURRENCIES;

  list.innerHTML = filteredList.map(c => {
    const r = getRate(c.code);
    const rateStr = r ? (c.symbol + (r > 1000 ? Math.round(r).toLocaleString() : r > 10 ? r.toFixed(2) : r.toFixed(4))) : '—';
    return `<div class="currency-item ${selectedCode===c.code?'selected':''}" onclick="selectCurrency('${c.code}')">
      <span class="ci-flag">${c.flag}</span>
      <div class="ci-info"><div class="ci-code">${c.code}</div><div class="ci-name">${c.name}</div></div>
      <div class="ci-rate">${rateStr}</div>
      <svg class="ci-check" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>`;
  }).join('') || '<div style="padding:30px;text-align:center;color:rgba(255,255,255,.3);font-size:.84rem;">No currencies found</div>';
}

function filterList() { renderList(); }

function selectCurrency(code) {
  selectedCode = code;
  const c = ALL_CURRENCIES.find(x => x.code === code);
  if(!c) return;

  // Update preview
  document.getElementById('selectedPreview').style.display = 'flex';
  document.getElementById('spFlag').textContent = c.flag;
  document.getElementById('spCode').textContent = c.code;
  document.getElementById('spName').textContent = c.name;
  document.getElementById('spRate').textContent = formatRate(code, c.symbol);

  document.getElementById('confirmBtn').disabled = false;
  document.getElementById('confirmBtn').textContent = 'Use ' + c.code + ' →';

  renderList();
  renderPopular();
}

function confirmCurrency() {
  if(!selectedCode) return;
  const c = ALL_CURRENCIES.find(x => x.code === selectedCode);
  updateCurrentUser({
    defaultCurrency: selectedCode,
    defaultCurrencySymbol: c.symbol,
    defaultCurrencyName: c.name,
    defaultCurrencyFlag: c.flag
  });
  window.location.href = 'dashboard.html';
}

// Init
fetchRates();
</script>
</body>
</html>
