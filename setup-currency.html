*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;color:#fff;font-family:'IBM Plex Sans',-apple-system,sans-serif;background-color:#0B0E11;background-image:radial-gradient(circle,rgba(255,255,255,0.07) 1.5px,transparent 1.5px);background-size:26px 26px;}

/* Full page flex layout */
.setup-page{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:520px;margin:0 auto;}

/* FIXED HEADER */
.setup-header{flex-shrink:0;padding:20px 20px 0;text-align:center;background:#0B0E11;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:16px;}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:16px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#F0B90B,#F8D12F);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.logo-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.15rem;color:#fff;}
.title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.25rem;color:#fff;margin-bottom:4px;}
.subtitle{font-size:.78rem;color:rgba(255,255,255,.4);line-height:1.5;}

/* SCROLLABLE MIDDLE */
.setup-body{flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch;}
.setup-body::-webkit-scrollbar{width:3px;}
.setup-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

/* FIXED FOOTER */
.setup-footer{flex-shrink:0;padding:14px 20px 24px;background:#0B0E11;border-top:1px solid rgba(255,255,255,.06);}

/* Popular currencies */
.popular-label{font-size:.65rem;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.popular-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px;}
.pop-btn{background:#0D1117;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:9px 4px;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit;}
.pop-btn:hover,.pop-btn:active{border-color:rgba(240,185,11,.3);background:rgba(240,185,11,.06);}
.pop-btn.selected{border-color:#F0B90B;background:rgba(240,185,11,.1);}
.pop-flag{font-size:1.3rem;display:block;margin-bottom:2px;}
.pop-code{font-size:.68rem;font-weight:700;color:#fff;font-family:'Space Grotesk',sans-serif;}

/* Search */
.search-wrap{position:relative;margin-bottom:12px;}
.search-input{width:100%;background:#0D1117;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:11px 14px 11px 40px;color:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:rgba(240,185,11,.4);}
.search-input::placeholder{color:rgba(255,255,255,.25);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);pointer-events:none;}

/* Selected preview */
.selected-preview{background:rgba(240,185,11,.06);border:1px solid rgba(240,185,11,.2);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.sp-flag{font-size:1.8rem;}
.sp-info{flex:1;}
.sp-code{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;color:#F0B90B;}
.sp-name{font-size:.72rem;color:rgba(255,255,255,.45);margin-top:1px;}
.sp-rate{font-family:'IBM Plex Mono',monospace;font-size:.74rem;color:rgba(255,255,255,.45);text-align:right;flex-shrink:0;}

/* Currency list */
.currency-list{border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden;}
.currency-item{display:flex;align-items:center;gap:12px;padding:11px 13px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.04);}
.currency-item:last-child{border-bottom:none;}
.currency-item:hover,.currency-item:active{background:rgba(255,255,255,.04);}
.currency-item.selected{background:rgba(240,185,11,.07);border-left:2px solid #F0B90B;}
.ci-flag{font-size:1.2rem;flex-shrink:0;width:26px;text-align:center;}
.ci-info{flex:1;min-width:0;}
.ci-code{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.85rem;color:#fff;}
.ci-name{font-size:.68rem;color:rgba(255,255,255,.4);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-rate{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:rgba(255,255,255,.45);text-align:right;flex-shrink:0;}
.ci-check{color:#F0B90B;flex-shrink:0;display:none;margin-left:6px;}
.currency-item.selected .ci-check{display:block;}

/* Continue button */
.btn-gold{width:100%;padding:15px;background:linear-gradient(135deg,#F0B90B,#F8D12F);border:none;border-radius:12px;color:#000;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:opacity .2s;}
.btn-gold:active{opacity:.85;}
.btn-gold:disabled{opacity:.35;cursor:not-allowed;}
.rate-note{text-align:center;font-size:.68rem;color:rgba(255,255,255,.2);margin-top:8px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1E2329;border:1px solid rgba(240,185,11,.3);border-radius:12px;padding:10px 18px;font-size:.82rem;color:#F0B90B;box-shadow:0 8px 32px rgba(0,0,0,.6);transition:transform .3s;z-index:9999;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>

let selectedCode = null;
let rates = {};
let filteredList = [...ALL_CURRENCIES];

async function fetchRates() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const d = await r.json();
    if(d.rates) {
      rates = d.rates;
      document.getElementById('rateNote').textContent = 'Live rates В· Updated just now';
      renderList();
      renderPopular();
    }
  } catch(e) {
    // Use fallback
    rates = {USD:1,EUR:0.92,GBP:0.79,JPY:149,INR:83.5,CNY:7.2,AUD:1.53,CAD:1.36,CHF:0.88,HKD:7.82,SGD:1.34,KRW:1325,BRL:5.05,MXN:17.1,IDR:15800,TRY:30.5,ZAR:18.6,ARS:890,AED:3.67,SAR:3.75,NGN:1450,VES:36,THB:35,VND:24500,PHP:56,MYR:4.7,PKR:278,BDT:110};
    document.getElementById('rateNote').textContent = 'Estimated rates (offline)';
    renderList();
    renderPopular();
  }
}

function getRate(code) { return rates[code] || null; }

function formatRate(code, symbol) {
  const r = getRate(code);
  if(!r) return 'вЂ”';
  const val = r;
  return '1 USDC = ' + symbol + (val > 1000 ? Math.round(val).toLocaleString() : val > 10 ? val.toFixed(2) : val.toFixed(4));
}

function renderPopular() {
  const grid = document.getElementById('popularGrid');
  grid.innerHTML = POPULAR.map(code => {
    const c = ALL_CURRENCIES.find(x => x.code === code);
    if(!c) return '';
    return `<button class="pop-btn ${selectedCode===code?'selected':''}" onclick="selectCurrency('${code}')">
      <span class="pop-flag">${c.flag}</span>
      <span class="pop-code">${code}</span>
    </button>`;
  }).join('');
}

function renderList() {
  const list = document.getElementById('currencyList');
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredList = q
    ? ALL_CURRENCIES.filter(c => c.code.toLowerCase().includes(q) || c.name.toLowerCase().includes(q))
    : ALL_CURRENCIES;

  list.innerHTML = filteredList.map(c => {
    const r = getRate(c.code);
    const rateStr = r ? (c.symbol + (r > 1000 ? Math.round(r).toLocaleString() : r > 10 ? r.toFixed(2) : r.toFixed(4))) : 'вЂ”';
    return `<div class="currency-item ${selectedCode===c.code?'selected':''}" onclick="selectCurrency('${c.code}')">
      <span class="ci-flag">${c.flag}</span>
      <div class="ci-info"><div class="ci-code">${c.code}</div><div class="ci-name">${c.name}</div></div>
      <div class="ci-rate">${rateStr}</div>
      <svg class="ci-check" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>`;
  }).join('') || '<div style="padding:30px;text-align:center;color:rgba(255,255,255,.3);font-size:.84rem;">No currencies found</div>';
}

function filterList() { renderList(); }

function selectCurrency(code) {
  selectedCode = code;
  const c = ALL_CURRENCIES.find(x => x.code === code);
  if(!c) return;

  // Update preview
  document.getElementById('selectedPreview').style.display = 'flex';
  document.getElementById('spFlag').textContent = c.flag;
  document.getElementById('spCode').textContent = c.code;
  document.getElementById('spName').textContent = c.name;
  document.getElementById('spRate').textContent = formatRate(code, c.symbol);

  document.getElementById('confirmBtn').disabled = false;
  document.getElementById('confirmBtn').textContent = 'Use ' + c.code + ' в†’';

  renderList();
  renderPopular();
}

function confirmCurrency() {
  if(!selectedCode) return;
  const c = ALL_CURRENCIES.find(x => x.code === selectedCode);
  updateCurrentUser({
    defaultCurrency: selectedCode,
    defaultCurrencySymbol: c.symbol,
    defaultCurrencyName: c.name,
    defaultCurrencyFlag: c.flag
  });
  window.location.href = 'dashboard.html';
}

// Init
fetchRates();
</script>
</body>
</html>
